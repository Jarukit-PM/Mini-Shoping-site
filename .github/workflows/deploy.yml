# CD — runs on push to main after CI checks pass.
# Deploys apps/web to Vercel and triggers a Render deploy for the Go API.
#
# Required GitHub repository secrets:
#   VERCEL_TOKEN          — https://vercel.com/account/tokens
#   VERCEL_ORG_ID         — Vercel project → Settings → General
#   VERCEL_PROJECT_ID     — same page
#   RENDER_DEPLOY_HOOK_URL — Render service → Settings → Deploy Hook
#
# One-time platform setup: see docs/deploy.md

name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  verify:
    name: Pre-deploy checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: services/api/go.mod
          cache-dependency-path: services/api/go.sum

      - name: Go API tests
        working-directory: services/api
        run: go test ./...

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Next.js lint and build
        working-directory: apps/web
        run: |
          npm ci
          npm run lint
          npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

      - uses: docker/setup-buildx-action@v3

      - name: Build API Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.api
          push: false
          tags: mini-shop-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-api:
    name: Deploy API (Render)
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_URL secret is not set"
            exit 1
          fi
          curl --fail-with-body -sS -X POST "$RENDER_DEPLOY_HOOK_URL"

  deploy-web:
    name: Deploy web (Vercel)
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      # Run from repo root: Vercel project Root Directory is already apps/web.
      # Setting working-directory here would resolve to apps/web/apps/web.
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v42.3.0
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
